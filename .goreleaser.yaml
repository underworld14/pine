# goreleaser configuration — builds cross-platform binaries with the embedded
# web UI and publishes a GitHub Release. See https://goreleaser.com
version: 2

project_name: pine

before:
  hooks:
    - go mod tidy

builds:
  - id: pine
    main: ./cmd/pine
    binary: pine
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=embedassets   # embed web/build (produced by the release workflow)
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: pine
    name_template: "pine_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  name_template: "Pine {{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
