name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, including steps to reproduce.
      placeholder: |
        1. Run `pine ...`
        2. ...
        3. Expected X, got Y
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pine version
      description: Output of `pine --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: macOS 14 arm64 / Ubuntu 24.04 amd64 / Windows 11
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: pine doctor output (optional)
      render: shell
